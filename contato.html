<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>


    <style>

        /* Estilo geral da pĂĄgina */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: white;
            color: black;
            transition: 0.3s; /* Suaviza a troca de tema claro/escuro */
        }

        /* MENU SUPERIOR */
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        /* Links do menu */
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* Efeito ao passar o mouse */
        nav a:hover {
            background-color: #555;
            box-shadow: 0 0 5px rgba(0,0,0,0.4);
        }

        /* BotĂŁo para alternar o tema claro/escuro */
        #temaBtn {
            background-color: #777;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        #temaBtn:hover {
            background-color: #999;
        }

        /* Ărea principal do conteĂşdo */
        .container {
            max-width: 900px; /* Largura mĂĄxima */
            margin: 40px auto; /* Centraliza a div */
            padding: 20px;
        }

        /* Estilo dos rĂłtulos */
        label {
            font-size: 18px;
            display: block;
            margin-top: 15px;
        }

        /* Campos de texto */
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            font-size: 16px;
            border: 1px solid #aaa;
            border-radius: 5px;
        }

        /* Caixa de mensagem */
        textarea {
            height: 120px;
            resize: none; /* Impede redimensionar */
        }

        /* BotĂŁo de envio */
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #555;
            box-shadow: 0 0 5px rgba(0,0,0,0.4);
        }

        /* RodapĂŠ */
        footer {
            background-color: #333;
            color: white;
            text-align: right;
            padding: 15px;
            margin-top: 40px;
            font-style: italic;
            font-size: 10px;
        }

        /* 

            Quando o botao "Tema claro/escuro"  e clickado, adiciona a classe "dark-mode" no body,
            todas essas regras abaixo entram em aĂ§ĂŁo.
        */
        .dark-mode {
            background-color: #222;
            color: white;
        }

        .dark-mode nav {
            background-color: #000;
        }

        .dark-mode nav a:hover {
            background-color: #444;
        }

        .dark-mode footer {
            background-color: #000;
        }

    </style>
</head>

<body>

    <!-- MENU SUPERIOR (igual em todas as pĂĄginas) -->
    <nav>
        <a href="sobre.html">Sobre mim</a>
        <a href="formacao.html">FormaĂ§ĂŁo</a>
        <a href="portfolio.html">PortfĂłlio</a>
        <a href="contato.html">Contato</a>

        <!-- BotĂŁo que troca o tema claro/escuro -->
        <button id="temaBtn">Tema Claro/Escuro</button>
    </nav>

    <!-- CONTEĂDO PRINCIPAL -->
    <div class="container">

        <h1>Contato</h1>

        <!-- 
            FORMULĂRIO DE CONTATO: O usuĂĄrio digita nome, e-mail e mensagem.
            O JavaScript vai validar antes de "enviar".
        -->
        <form id="formContato">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="usuario@dominio.com">

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea>

            <button type="submit">Enviar</button>
        </form>

    </div>

    <!-- RODAPĂ -->
    <footer>
        Desenvolvido por Wellington Ferreira
    </footer>

    <!-- 
        JAVASCRIPT DO FORMULĂRIO:
        ValidaĂ§ĂŁo dos campos, simulacao de envio e limpa os formulĂĄrios
    -->
    <script>

        // Seleciona o formulĂĄrio pelo ID
        document.getElementById("formContato").addEventListener("submit", function(event) {

            event.preventDefault(); 
            // Impede o envio real do formulĂĄrio (nĂŁo vai para servidor)

            // Pegamos os valores digitados pelo usuĂĄrio
            let nome = document.getElementById("nome").value.trim();
            let email = document.getElementById("email").value.trim();
            let mensagem = document.getElementById("mensagem").value.trim();

            // Verifica se algum campo estĂĄ vazio
            if (nome === "" || email === "" || mensagem === "") {
                alert("Por favor, preencha todos os campos.");
                return; // Para a funĂ§ĂŁo aqui
            }

            // ExpressĂŁo regular simples para validar e-mail
            let padraoEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!padraoEmail.test(email)) {
                alert("Por favor, informe um e-mail vĂĄlido.");
                return;
            }

            // Se tudo estiver certo:
            alert("Mensagem enviada com sucesso!");

            // Limpa os campos do formulĂĄrio
            document.getElementById("formContato").reset();
        });

        /* 
            BotĂŁo adicionar/remover a classe "dark-mode" no body.
        */
        document.getElementById("temaBtn").addEventListener("click", function() {
            document.body.classList.toggle("dark-mode");

            // Se o tema escuro estiver ativo, salva "escuro"
            if (document.body.classList.contains("dark-mode")) {
                localStorage.setItem("tema", "escuro");
            } 
            // Se nĂŁo estiver, salva "claro"
            else {
                localStorage.setItem("tema", "claro");
            }
        });

        /*
            Quando a pĂĄgina carregar, e verificado se existe um tema salvo.
            Se existir e for "escuro", ele e aplicado automaticamente.
            Isso faz com que o tema continue igual ao navegar entre pĂĄginas.
        */
        let temaSalvo = localStorage.getItem("tema");

        if (temaSalvo === "escuro") {
            document.body.classList.add("dark-mode");
        }

    </script>

</body>
</html>
